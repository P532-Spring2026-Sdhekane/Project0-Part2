<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck Pond</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .card {
            box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
            transition: 0.3s;
            width: 250px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .card:hover {
            box-shadow: 0 8px 16px 0 rgba(0,0,0,0.2);
        }

        img {
            border-radius: 5px 5px 0 0;
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .container {
            padding: 2px 16px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin: 10px 0;
        }

        .loading {
            text-align: center;
            font-size: 18px;
            color: #666;
        }
    </style>
</head>
<body>
<h1>Duck Pond</h1>
<div class="card-container" id="duckContainer">
    <div class="loading">Loading ducks...</div>
</div>

<script>
    const host = "https://ducks-service-latest-4twh.onrender.com";

    async function loadDucks() {
        try {
            let response = await fetch(host + "/ducks");
            let ducks = await response.json();
            displayDucks(ducks);
        } catch (error) {
            console.error("Error loading ducks:", error);
            document.getElementById("duckContainer").innerHTML =
                "<div class='loading'>Error loading ducks. Make sure the backend is running.</div>";
        }
    }

    function displayDucks(ducks) {
        let container = document.getElementById("duckContainer");
        container.innerHTML = "";

        if (ducks.length === 0) {
            container.innerHTML = "<div class='loading'>No ducks in the pond yet!</div>";
            return;
        }

        ducks.forEach(duck => {
            let card = document.createElement("div");
            card.className = "card";

            let imageUrl = `${host}/ducks/${duck.id}/image`;

            card.innerHTML = `
                    <img src="${imageUrl}" alt="${duck.type} duck"
                         onerror="this.src='https://via.placeholder.com/250x200?text=No+Image'">
                    <div class="container">
                        <h4><b>${duck.type}</b></h4>
                        <p>ID: ${duck.id}</p>
                    </div>
                `;

            container.appendChild(card);
        });
    }
    
    window.onload = loadDucks;
</script>
</body>
</html>
