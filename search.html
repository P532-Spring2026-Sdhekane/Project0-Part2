<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search ducks</title>
  <style>
    table {
      border: 1px solid;
      border-collapse: collapse;
      margin: 30px;
    }

    table td,
    th {
      border-left: 1px solid #000;
      border-right: 1px solid #000;
      padding: 8px;
    }

    table td:first-child {
      border-left: none;
    }

    table td:last-child {
      border-right: none;
    }
  </style>
</head>
<body>
<label>Type:</label>
<input id="type" />
<button onclick="search()">Search</button>
<br />
<table>
  <thead>
  <tr>
    <th>Id</th>
    <th>Type</th>
  </tr>
  </thead>
  <tbody id="result">
  <tr>
    <td colspan="2" style="text-align: center;">Loading ducks...</td>
  </tr>
  </tbody>
</table>

<script>
  let ducks = [];
  const host = "https://ducks-service-latest-4twh.onrender.com";

  async function getAll() {
    try {
      console.log("Fetching ducks from backend...");
      let response = await fetch(host + "/ducks");
      if (!response.ok) {
        throw new Error("Failed to fetch ducks");
      }
      ducks = await response.json();
      console.log("Fetched ducks:", ducks);

      displayAllDucks();

      return ducks;
    } catch (error) {
      console.error("Error fetching ducks:", error);
      let table = document.getElementById("result");
      table.innerHTML = `<tr><td colspan="2" style="text-align: center; color: red;">Error loading ducks. Make sure backend is running.</td></tr>`;
      return [];
    }
  }

  function displayAllDucks() {
    let table = document.getElementById("result");
    table.innerHTML = "";

    if (ducks.length === 0) {
      table.innerHTML = `<tr><td colspan="2" style="text-align: center;">No ducks found in the database.</td></tr>`;
      return;
    }

    for (let duck of ducks) {
      let row = document.createElement("tr");

      let cell1 = document.createElement("td");
      let id = document.createTextNode(duck.id);
      cell1.appendChild(id);
      row.appendChild(cell1);

      let cell2 = document.createElement("td");
      let type = document.createTextNode(duck.type);
      cell2.appendChild(type);
      row.appendChild(cell2);

      table.appendChild(row);
    }
  }

  async function search() {
    let duckType = document.getElementById("type").value;
    let table = document.getElementById("result");

    table.innerHTML = `<tr><td colspan="2" style="text-align: center;">Searching...</td></tr>`;

    if (ducks.length === 0) {
      await getAll();
    }

    table.innerHTML = "";

    let foundDucks = 0;
    for (let duck of ducks) {
      if (!duckType || duck.type.toLowerCase() === duckType.toLowerCase()) {
        foundDucks++;
        let row = document.createElement("tr");

        let cell1 = document.createElement("td");
        let id = document.createTextNode(duck.id);
        cell1.appendChild(id);
        row.appendChild(cell1);

        let cell2 = document.createElement("td");
        let type = document.createTextNode(duck.type);
        cell2.appendChild(type);
        row.appendChild(cell2);

        table.appendChild(row);
      }
    }

    if (foundDucks === 0) {
      table.innerHTML = `<tr><td colspan="2" style="text-align: center;">No ducks found${duckType ? " of type: " + duckType : ""}</td></tr>`;
    }
  }

  window.onload = function() {
    getAll();
  };
</script>
</body>
</html>
